<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/Search.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Search</title>
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <h1>Explore</h1>
      <p>Discover photos and videos</p>
    </header>

    <!-- SEARCH BAR -->
    <section class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search posts..." />
    </section>

    <!-- FILTERS -->
    <section class="filters">
      <button class="active">All</button>
      <button>Photos</button>
      <button>Videos</button>
      <button>Nature</button>
      <button>Tech</button>
    </section>

    <!-- GRID SECTION -->
    <section class="grid-container">
      <div class="grid-item">
        <img
          src="../Images/Search Images and Videos/WhatsApp Image 2026-05-26 at 20.05.01.jpeg"
          alt=""
        />
      </div>

      <div class="grid-item">
        <img
          src="../Images/Search Images and Videos/WhatsApp Image 2026-05-26 at 20.05.01 (1).jpeg"
        />
      </div>

      <div class="grid-item">
        <img
          src="../Images/Search Images and Videos/WhatsApp Image 2026-05-26 at 20.05.01 (2).jpeg"
        />
      </div>

      <div class="grid-item">
        <img
          src="../Images/Search Images and Videos/WhatsApp Image 2026-05-26 at 20.05.01 (3).jpeg"
        />
      </div>
    </section>
  </body>
</html>
